<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glass background -->
    <linearGradient id="glass" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.4"></stop>
    </linearGradient>

    <!-- Bubble gradient -->
    <linearGradient id="bubble" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#22d3ee"></stop>
      <stop offset="100%" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <!-- Glow -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"></feGaussianBlur>
    </filter>
  </defs>

  <!-- Glass card -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#glass)" stroke="rgba(255,255,255,0.2)" stroke-width="1"></rect>

  <!-- Glow -->
  <circle cx="32" cy="32" r="20" fill="#22d3ee" opacity="0.15" filter="url(#blur)"></circle>

  <!-- Chat bubble -->
  <path d="M20 22C20 18 23 16 28 16H36C41 16 44 18 44 22V30C44 34 41 36 36 36H30L24 42V36C22 36 20 34 20 30V22Z" fill="url(#bubble)"></path>

  <!-- Document lines -->
  <rect x="26" y="22" width="12" height="2.5" rx="1.2" fill="#22c55e"></rect>
  <rect x="26" y="26" width="14" height="2.5" rx="1.2" fill="#38bdf8"></rect>
  <rect x="26" y="30" width="10" height="2.5" rx="1.2" fill="#f97316"></rect>

  <!-- Echo waves -->
  <path d="M46 24C50 28 50 36 46 40" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.7"></path>
  <path d="M50 20C56 28 56 36 50 44" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.4"></path>
</svg>